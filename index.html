<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Inch Thermal Bill Generator with Barcode</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        /* --- Screen Styling (Jo Computer/Phone par dikhega) --- */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .invoice-box {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            background: #fff;
            border: 1px solid #eee;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        }
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #218838;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f8f9fa; }
        .text-right { text-align: right; }
        .total-section {
            margin-top: 15px;
            text-align: right;
            font-weight: bold;
            font-size: 18px;
        }
        .barcode-container {
            text-align: center;
            margin-top: 15px;
        }
        .barcode-container svg {
            max-width: 100%;
            height: auto;
        }

        /* --- PRINT STYLING (Jo Print button dabane par chalega) --- */
        @media print {
            /* 1. Yeh line printer ko automatic 3 inch par set karegi */
            @page {
                size: 3in auto; /* Width 3 inch, height automatic jitna lamba bill ho */
                margin: 0;      /* Faltu ki khali jagah hatane ke liye */
            }

            body {
                width: 3in;
                margin: 0;
                padding: 0;
                background-color: #fff;
                color: #000;
                font-size: 14px;
                font-family: 'Courier New', Courier, monospace;
            }
            .invoice-box {
                width: 3in !important;
                max-width: 3in !important;
                padding: 5px !important;
                margin: 0 !important;
                border: none !important;
                box-shadow: none !important;
            }
            table {
                width: 100% !important;
                font-size: 13px;
            }
            th, td {
                padding: 6px 2px !important;
                border-bottom: 1px dashed #000 !important;
            }
            .total-section {
                font-size: 16px !important;
                border-top: 1px solid #000;
                padding-top: 5px;
            }
            .barcode-container {
                margin-top: 10px !important;
                display: block !important;
            }
            /* Buttons aur extra cheezein print mein na aayein */
            .no-print, button, .btn-container {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="invoice-box">
        <div style="text-align: center; margin-bottom: 15px;">
            <h2 style="margin: 0 0 5px 0; font-size: 22px;">MY RETAIL SHOP</h2>
            <p style="margin: 2px 0; font-size: 12px;">Bhiwandi, Maharashtra, India</p>
            <p style="margin: 2px 0; font-size: 12px;">Mob: +91 9876543210</p>
        </div>
        
        <hr style="border-top: 1px dashed #000;">

        <div style="font-size: 13px; margin-bottom: 10px;">
            <p style="margin: 3px 0;"><b>Bill No:</b> #1024</p>
            <p style="margin: 3px 0;"><b>Date:</b> 22-06-2026</p>
            <p style="margin: 3px 0;"><b>Table No:</b> <span id="table-number" style="font-weight: bold;">--</span></p>
            <p style="margin: 3px 0;"><b>Order No:</b> <span id="order-text">ORD9876</span></p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th class="text-right">Qty</th>
                    <th class="text-right">Price</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Sample Item 1</td>
                    <td class="text-right">2</td>
                    <td class="text-right">₹150.00</td>
                </tr>
                <tr>
                    <td>Sample Item 2</td>
                    <td class="text-right">1</td>
                    <td class="text-right">₹200.00</td>
                </tr>
            </tbody>
        </table>

        <div class="total-section">
            <span>Grand Total: ₹500.00</span>
        </div>

        <hr style="border-top: 1px dashed #000; margin-top: 15px;">
        
        <div class="barcode-container">
            <svg id="barcode"></svg>
        </div>

        <p style="text-align: center; font-size: 12px; font-style: italic; margin-top: 10px;">Thank You! Visit Again.</p>
    </div>

    <div class="btn-container no-print">
        <button onclick="window.print()">Print Bill</button>
    </div>

    <script>
        window.onload = function() {
            // 1. Random Table Number (1 to 8)
            var randomTable = Math.floor(Math.random() * 8) + 1;
            document.getElementById("table-number").innerText = randomTable;

            // 2. Barcode Generation
            var orderId = document.getElementById("order-text").innerText;
            JsBarcode("#barcode", orderId, {
                format: "CODE128",
                width: 2,
                height: 40,
                displayValue: false
            });
        };
    </script>

</body>
</html>

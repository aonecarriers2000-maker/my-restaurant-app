<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Inch Thermal Bill Generator</title>
    <style>
        /* --- Screen Styling --- */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .invoice-box {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            background: #fff;
            border: 1px solid #eee;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        }
        
        /* Input Form Styling */
        .item-form {
            max-width: 400px;
            margin: 0 auto 20px auto;
            padding: 15px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .form-group {
            flex: 1;
        }
        
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn-add {
            background-color: #007bff;
            color: white;
            width: 100%;
            margin-top: 5px;
        }
        .btn-add:hover { background-color: #0056b3; }
        .btn-print {
            background-color: #28a745;
            color: white;
            width: 100%;
            max-width: 400px;
            padding: 12px;
            font-size: 16px;
        }
        .btn-print:hover { background-color: #218838; }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
        }
        .btn-delete:hover { background-color: #bd2130; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f8f9fa; }
        .text-right { text-align: right; }
        .total-section {
            margin-top: 15px;
            text-align: right;
            font-weight: bold;
            font-size: 18px;
        }

        @media print {
            body, .item-form, .invoice-box, .btn-container {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="item-form no-print">
        <h3 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 5px;">Bill Details</h3>
        
        <div class="form-row">
            <div class="form-group">
                <label>Bill No:</label>
                <input type="text" id="input-bill-no" value="1024" oninput="updateBillNo()">
            </div>
            <div class="form-group">
                <label>Order / Token No:</label>
                <input type="text" id="input-order-no" placeholder="e.g. 45" oninput="updateOrderNo()">
            </div>
            <div class="form-group">
                <label>Table No:</label>
                <input type="text" id="input-table-no" placeholder="e.g. 5" oninput="updateTableNo()">
            </div>
        </div>

        <h3 style="margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Add Items</h3>
        <div class="form-group">
            <label>Item Name:</label>
            <input type="text" id="item-name" placeholder="e.g. Samosa">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Quantity:</label>
                <input type="number" id="item-qty" value="1" min="1" onkeydown="checkEnter(event)">
            </div>
            <div class="form-group">
                <label>Rate / Price (₹):</label>
                <input type="number" id="item-price" placeholder="0.00" step="0.01" onkeydown="checkEnter(event)">
            </div>
        </div>
        
        <button class="btn-add" onclick="addItem()">Add Item</button>
    </div>

    <!-- Bill Preview Area -->
    <div class="invoice-box" id="invoice-bill-area">
        <div style="text-align: center; margin-bottom: 12px;">
            <h2 style="margin: 0 0 4px 0; font-size: 22px; font-weight: bold;">MY RETAIL SHOP</h2>
            <p style="margin: 2px 0; font-size: 13px;">Bhiwandi, Maharashtra, India</p>
            <p style="margin: 2px 0; font-size: 13px;">Mob: +91 9876543210</p>
        </div>
        
        <div style="border-top: 1px dashed #000; margin: 8px 0;"></div>

        <div style="font-size: 14px; margin-bottom: 10px; line-height: 1.4;">
            <p style="margin: 2px 0;"><b>Bill No:</b> #<span id="bill-no">1024</span></p>
            <p style="margin: 2px 0;"><b>Order No:</b> <span id="order-no">--</span></p>
            <p style="margin: 2px 0;"><b>Table No:</b> <span id="table-number" style="font-weight: bold;">--</span></p>
            <p style="margin: 2px 0;"><b>Date:</b> <span id="bill-date">--</span></p>
        </div>

        <table id="bill-table">
            <thead>
                <tr>
                    <th style="font-weight: bold; border-bottom: 1px dashed #000;">Item</th>
                    <th class="text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Qty</th>
                    <th class="text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Rate</th>
                    <th class="text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Total</th>
                    <th class="delete-col text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Action</th>
                </tr>
            </thead>
            <tbody id="bill-items">
            </tbody>
        </table>

        <div class="total-section" style="margin-top: 15px; border-top: 1px dashed #000; padding-top: 8px;">
            <span>Grand Total: ₹<span id="grand-total">0.00</span></span>
        </div>

        <div style="border-top: 1px dashed #000; margin: 15px 0 8px 0;"></div>
        <p style="text-align: center; font-size: 13px; font-style: italic; margin: 0;">Thank You! Visit Again.</p>
    </div>

    <div class="btn-container no-print">
        <button class="btn-print" onclick="printViaRawBT()">Print Bill</button>
    </div>

    <script>
        var totalAmount = 0;

        window.onload = function() {
            var randomTable = Math.floor(Math.random() * 8) + 1;
            document.getElementById("input-table-no").value = randomTable;
            document.getElementById("table-number").innerText = randomTable;

            var today = new Date();
            var dateStr = today.getDate() + '-' + (today.getMonth()+1) + '-' + today.getFullYear();
            document.getElementById("bill-date").innerText = dateStr;
        };

        function updateBillNo() {
            var val = document.getElementById("input-bill-no").value;
            document.getElementById("bill-no").innerText = val ? val : "--";
        }

        function updateOrderNo() {
            var val = document.getElementById("input-order-no").value;
            document.getElementById("order-no").innerText = val ? val : "--";
        }

        function updateTableNo() {
            var val = document.getElementById("input-table-no").value;
            document.getElementById("table-number").innerText = val ? val : "--";
        }

        function checkEnter(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                addItem();
            }
        }

        function addItem() {
            var name = document.getElementById("item-name").value;
            var qty = parseInt(document.getElementById("item-qty").value);
            var price = parseFloat(document.getElementById("item-price").value);

            if(name === "" || isNaN(qty) || isNaN(price) || qty <= 0 || price <= 0) {
                alert("Please enter valid Item Name, Quantity and Rate!");
                return;
            }

            var itemTotal = qty * price;
            totalAmount += itemTotal;

            var tbody = document.getElementById("bill-items");
            var row = document.createElement("tr");

            row.innerHTML = `
                <td>${name}</td>
                <td class="text-right">${qty}</td>
                <td class="text-right">₹${price.toFixed(2)}</td>
                <td class="text-right">₹${itemTotal.toFixed(2)}</td>
                <td class="delete-col text-right"><button class="btn-delete" onclick="deleteItem(this, ${itemTotal})">Delete</button></td>
            `;

            tbody.appendChild(row);
            document.getElementById("grand-total").innerText = totalAmount.toFixed(2);

            document.getElementById("item-name").value = "";
            document.getElementById("item-qty").value = "1";
            document.getElementById("item-price").value = "";
            document.getElementById("item-name").focus();
        }

        function deleteItem(button, itemTotal) {
            var row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
            totalAmount -= itemTotal;
            document.getElementById("grand-total").innerText = totalAmount.toFixed(2);
        }

        // --- OFFICIAL RAWBT S.html INTENT METHOD ---
        function printViaRawBT() {
            let tableRows = document.querySelectorAll("#bill-items tr");
            if(tableRows.length === 0) {
                alert("Please add at least one item to print!");
                return;
            }

            // Copying bill layout
            let billClone = document.getElementById("invoice-bill-area").cloneNode(true);
            
            // UI Action Buttons remove kar rahe hain print se
            let deleteCols = billClone.querySelectorAll(".delete-col");
            deleteCols.forEach(col => col.remove());

            // Thermal Printer Optimized Stylesheet
            let htmlStyles = `
                <style>
                    body { 
                        width: 100%; 
                        margin: 0; 
                        padding: 5px; 
                        font-family: monospace; 
                        color: #000; 
                        background: #fff;
                        font-size: 14px;
                    }
                    table { width: 100%; border-collapse: collapse; }
                    th, td { padding: 5px 0; text-align: left; border-bottom: 1px dashed #000; font-size: 13px; }
                    .text-right { text-align: right; }
                    .total-section { margin-top: 12px; text-align: right; font-weight: bold; font-size: 16px; }
                </style>
            `;

            // Clean single HTML document compile 
            let fullHtmlString = "<html><head><meta charset='utf-8'>" + htmlStyles + "</head><body>" + billClone.innerHTML + "</body></html>";

            // Official RawBT Intent Syntax string injection
            let intentUrl = "intent:#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.html=" + encodeURIComponent(fullHtmlString) + ";end;";
            
            window.location.href = intentUrl;
        }
    </script>

</body>
</html>

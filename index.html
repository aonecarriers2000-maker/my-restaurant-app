<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Inch Thermal Bill & PDF Generator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .invoice-box {
            max-width: 360px;
            margin: auto;
            padding: 15px;
            background: #fff;
            border: 1px solid #eee;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        }
        .item-form {
            max-width: 360px;
            margin: 0 auto 20px auto;
            padding: 15px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .btn-container {
            max-width: 390px;
            margin: 20px auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 12px;
            font-size: 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn-add {
            background-color: #007bff;
            color: white;
            width: 100%;
            margin-top: 5px;
        }
        .btn-print-text {
            background-color: #28a745;
            color: white;
        }
        .btn-print-pdf {
            background-color: #ff9800;
            color: white;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 6px;
            text-align: left;
            border-bottom: 1px dashed #ddd;
            font-size: 13px;
        }
        th { background-color: #f8f9fa; }
        .text-right { text-align: right; }
        .total-section {
            margin-top: 15px;
            text-align: right;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="item-form">
        <h3 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 5px;">Bill Details</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Bill No:</label>
                <input type="text" id="input-bill-no" value="1024" oninput="updateBillNo()">
            </div>
            <div class="form-group">
                <label>Order / Token:</label>
                <input type="text" id="input-order-no" placeholder="--" oninput="updateOrderNo()">
            </div>
            <div class="form-group">
                <label>Table No:</label>
                <input type="text" id="input-table-no" placeholder="2" oninput="updateTableNo()">
            </div>
        </div>

        <h3 style="margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Add Items</h3>
        <div class="form-group">
            <label>Item Name:</label>
            <input type="text" id="item-name" placeholder="e.g. Biryani">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Quantity:</label>
                <input type="number" id="item-qty" value="1" min="1">
            </div>
            <div class="form-group">
                <label>Rate (₹):</label>
                <input type="number" id="item-price" placeholder="0.00" step="0.01">
            </div>
        </div>
        <button class="btn-add" onclick="addItem()">Add Item</button>
    </div>

    <div class="invoice-box" id="invoice-bill-area">
        <div style="text-align: center; margin-bottom: 12px;">
            <h2 style="margin: 0 0 4px 0; font-size: 20px; font-weight: bold;">MY RETAIL SHOP</h2>
            <p style="margin: 2px 0; font-size: 12px;">Bhiwandi, Maharashtra, India</p>
            <p style="margin: 2px 0; font-size: 12px;">Mob: +91 9876543210</p>
        </div>
        
        <div style="border-top: 1px dashed #000; margin: 8px 0;"></div>

        <div style="font-size: 12px; margin-bottom: 10px; line-height: 1.4;">
            <p style="margin: 2px 0;"><b>Bill No:</b> #<span id="bill-no">1024</span></p>
            <p style="margin: 2px 0;"><b>Order No:</b> <span id="order-no">--</span></p>
            <p style="margin: 2px 0;"><b>Table No:</b> <span id="table-number">2</span></p>
            <p style="margin: 2px 0;"><b>Date:</b> <span id="bill-date">--</span></p>
        </div>

        <table id="bill-table">
            <thead>
                <tr>
                    <th style="font-weight: bold; border-bottom: 1px dashed #000;">Item</th>
                    <th class="text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Qty</th>
                    <th class="text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Rate</th>
                    <th class="text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Total</th>
                </tr>
            </thead>
            <tbody id="bill-items">
            </tbody>
        </table>

        <div class="total-section" style="margin-top: 15px; border-top: 1px dashed #000; padding-top: 8px;">
            <span>Grand Total: ₹<span id="grand-total">0.00</span></span>
        </div>

        <div style="border-top: 1px dashed #000; margin: 15px 0 8px 0;"></div>
        <p style="text-align: center; font-size: 12px; font-style: italic; margin: 0;">Thank You! Visit Again.</p>
    </div>

    <div class="btn-container">
        <button class="btn-print-text" onclick="printViaText()">Option 1: Print via Text (Fast ESC/POS)</button>
        <button class="btn-print-pdf" onclick="printViaPDF()">Option 2: Print via PDF (3-Inch Graphic)</button>
    </div>

    <script>
        var totalAmount = 0;

        window.onload = function() {
            var today = new Date();
            var dateStr = today.getDate() + '-' + (today.getMonth()+1) + '-' + today.getFullYear();
            document.getElementById("bill-date").innerText = dateStr;
        };

        function updateBillNo() { document.getElementById("bill-no").innerText = document.getElementById("input-bill-no").value || "--"; }
        function updateOrderNo() { document.getElementById("order-no").innerText = document.getElementById("input-order-no").value || "--"; }
        function updateTableNo() { document.getElementById("table-number").innerText = document.getElementById("input-table-no").value || "--"; }

        function addItem() {
            var name = document.getElementById("item-name").value;
            var qty = parseInt(document.getElementById("item-qty").value);
            var price = parseFloat(document.getElementById("item-price").value);

            if(name === "" || isNaN(qty) || isNaN(price)) {
                alert("Please fill details");
                return;
            }

            var itemTotal = qty * price;
            totalAmount += itemTotal;

            var tbody = document.getElementById("bill-items");
            var row = document.createElement("tr");

            row.innerHTML = `
                <td>${name} <br><button class="btn-delete" style="padding:1px 5px; font-size:10px;" onclick="deleteItem(this, ${itemTotal})">Remove</button></td>
                <td class="text-right">${qty}</td>
                <td class="text-right">₹${price.toFixed(2)}</td>
                <td class="text-right">₹${itemTotal.toFixed(2)}</td>
            `;

            tbody.appendChild(row);
            document.getElementById("grand-total").innerText = totalAmount.toFixed(2);

            document.getElementById("item-name").value = "";
            document.getElementById("item-price").value = "";
        }

        function deleteItem(button, itemTotal) {
            var row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
            totalAmount -= itemTotal;
            document.getElementById("grand-total").innerText = totalAmount.toFixed(2);
        }

        // ================= FIX METHOD 1: STANDARD RAWBT TEXT INTENT =================
        function printViaText() {
            let tableRows = document.querySelectorAll("#bill-items tr");
            if(tableRows.length === 0) { alert("Please add items first!"); return; }

            let text = "";
            text += "         MY RETAIL SHOP          \n";
            text += "   Bhiwandi, Maharashtra, India  \n";
            text += "        Mob: +91 9876543210      \n";
            text += "------------------------------------------------\n";
            text += "Bill No:  #" + document.getElementById("bill-no").innerText + "\n";
            text += "Order No: " + document.getElementById("order-no").innerText + "\n";
            text += "Table No: " + document.getElementById("table-number").innerText + "\n";
            text += "Date:     " + document.getElementById("bill-date").innerText + "\n";
            text += "------------------------------------------------\n";
            text += "Item Name          Qty    Rate          Total   \n";
            text += "------------------------------------------------\n";

            tableRows.forEach(row => {
                let cols = row.querySelectorAll("td");
                if(cols.length >= 4) {
                    let name = cols[0].childNodes[0].textContent.trim();
                    let qty = cols[1].innerText;
                    let rate = cols[2].innerText.replace('₹', '');
                    let total = cols[3].innerText.replace('₹', '');
                    text += name.substring(0, 18).padEnd(19, ' ') + qty.padStart(4, ' ') + rate.padStart(11, ' ') + total.padStart(14, ' ') + "\n";
                }
            });

            text += "------------------------------------------------\n";
            let totalVal = document.getElementById("grand-total").innerText;
            text += "Grand Total:".padEnd(30, ' ') + ("INR " + totalVal).padStart(18, ' ') + "\n";
            text += "------------------------------------------------\n\n";
            text += "          Thank You! Visit Again.       \n\n\n\n";

            // Safe Android intent formatting
            let url = "intent:#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.text=" + encodeURIComponent(text) + ";end;";
            window.location.href = url;
        }

        // ================= FIX METHOD 2: GRAPHIC PDF VIA BASE64 INTENT =================
        function printViaPDF() {
            let tableRows = document.querySelectorAll("#bill-items tr");
            if(tableRows.length === 0) { alert("Please add items first!"); return; }

            let deleteButtons = document.querySelectorAll(".btn-delete");
            deleteButtons.forEach(btn => btn.style.display = "none");

            const element = document.getElementById("invoice-bill-area");

            html2canvas(element, { scale: 2 }).then(canvas => {
                deleteButtons.forEach(btn => btn.style.display = "inline-block");

                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const { jsPDF } = window.jspdf;

                const imgWidth = 76; 
                const pageHeight = (canvas.height * imgWidth) / canvas.width;

                const doc = new jsPDF({
                    orientation: 'p',
                    unit: 'mm',
                    format: [imgWidth, pageHeight + 5]
                });

                doc.addImage(imgData, 'JPEG', 0, 0, imgWidth, pageHeight);
                
                // base64 pdf string output bina window open kiye
                let pdfBase64 = doc.output('datauristring').split(',')[1];
                
                // RawBT Intent for raw base64 PDF processing
                let url = "intent:#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.base64=" + encodeURIComponent(pdfBase64) + ";S.extension=pdf;end;";
                window.location.href = url;
            });
        }
    </script>
</body>
</html>

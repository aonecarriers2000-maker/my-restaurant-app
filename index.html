<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Inch Thermal Bill & PDF Generator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* --- Screen Styling --- */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .invoice-box {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            background: #fff;
            border: 1px solid #eee;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        }
        
        /* Input Form Styling */
        .item-form {
            max-width: 400px;
            margin: 0 auto 20px auto;
            padding: 15px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .form-group {
            flex: 1;
        }
        
        .btn-container {
            max-width: 440px;
            margin: 20px auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 12px;
            font-size: 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn-add {
            background-color: #007bff;
            color: white;
            width: 100%;
            margin-top: 5px;
        }
        .btn-add:hover { background-color: #0056b3; }
        
        .btn-print-text {
            background-color: #28a745;
            color: white;
        }
        .btn-print-text:hover { background-color: #218838; }

        .btn-print-pdf {
            background-color: #ff9800;
            color: white;
        }
        .btn-print-pdf:hover { background-color: #e68a00; }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
        }
        .btn-delete:hover { background-color: #bd2130; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f8f9fa; }
        .text-right { text-align: right; }
        .total-section {
            margin-top: 15px;
            text-align: right;
            font-weight: bold;
            font-size: 18px;
        }

        @media print {
            body, .item-form, .btn-container {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="item-form">
        <h3 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 5px;">Bill Details</h3>
        
        <div class="form-row">
            <div class="form-group">
                <label>Bill No:</label>
                <input type="text" id="input-bill-no" value="1024" oninput="updateBillNo()">
            </div>
            <div class="form-group">
                <label>Order / Token:</label>
                <input type="text" id="input-order-no" placeholder="e.g. 45" oninput="updateOrderNo()">
            </div>
            <div class="form-group">
                <label>Table No:</label>
                <input type="text" id="input-table-no" placeholder="e.g. 5" oninput="updateTableNo()">
            </div>
        </div>

        <h3 style="margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Add Items</h3>
        <div class="form-group">
            <label>Item Name:</label>
            <input type="text" id="item-name" placeholder="e.g. Samosa">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Quantity:</label>
                <input type="number" id="item-qty" value="1" min="1" onkeydown="checkEnter(event)">
            </div>
            <div class="form-group">
                <label>Rate / Price (₹):</label>
                <input type="number" id="item-price" placeholder="0.00" step="0.01" onkeydown="checkEnter(event)">
            </div>
        </div>
        
        <button class="btn-add" onclick="addItem()">Add Item</button>
    </div>

    <div class="invoice-box" id="invoice-bill-area">
        <div style="text-align: center; margin-bottom: 12px;">
            <h2 style="margin: 0 0 4px 0; font-size: 22px; font-weight: bold;">MY RETAIL SHOP</h2>
            <p style="margin: 2px 0; font-size: 13px;">Bhiwandi, Maharashtra, India</p>
            <p style="margin: 2px 0; font-size: 13px;">Mob: +91 9876543210</p>
        </div>
        
        <div style="border-top: 1px dashed #000; margin: 8px 0;"></div>

        <div style="font-size: 14px; margin-bottom: 10px; line-height: 1.4;">
            <p style="margin: 2px 0;"><b>Bill No:</b> #<span id="bill-no">1024</span></p>
            <p style="margin: 2px 0;"><b>Order No:</b> <span id="order-no">--</span></p>
            <p style="margin: 2px 0;"><b>Table No:</b> <span id="table-number" style="font-weight: bold;">--</span></p>
            <p style="margin: 2px 0;"><b>Date:</b> <span id="bill-date">--</span></p>
        </div>

        <table id="bill-table">
            <thead>
                <tr>
                    <th style="font-weight: bold; border-bottom: 1px dashed #000;">Item</th>
                    <th class="text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Qty</th>
                    <th class="text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Rate</th>
                    <th class="text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Total</th>
                    <th class="delete-col text-right" style="font-weight: bold; border-bottom: 1px dashed #000;">Action</th>
                </tr>
            </thead>
            <tbody id="bill-items">
            </tbody>
        </table>

        <div class="total-section" style="margin-top: 15px; border-top: 1px dashed #000; padding-top: 8px;">
            <span>Grand Total: ₹<span id="grand-total">0.00</span></span>
        </div>

        <div style="border-top: 1px dashed #000; margin: 15px 0 8px 0;"></div>
        <p style="text-align: center; font-size: 13px; font-style: italic; margin: 0;">Thank You! Visit Again.</p>
    </div>

    <div class="btn-container">
        <button class="btn-print-text" onclick="printViaText()">Option 1: Print via Text (Fast ESC/POS)</button>
        <button class="btn-print-pdf" onclick="printViaPDF()">Option 2: Print via PDF (3-Inch Graphic)</button>
    </div>

    <script>
        var totalAmount = 0;

        // Auto initialization on load
        window.onload = function() {
            var randomTable = Math.floor(Math.random() * 8) + 1;
            document.getElementById("input-table-no").value = randomTable;
            document.getElementById("table-number").innerText = randomTable;

            var today = new Date();
            var dateStr = today.getDate() + '-' + (today.getMonth()+1) + '-' + today.getFullYear();
            document.getElementById("bill-date").innerText = dateStr;
        };

        // UI Mirror binding functions
        function updateBillNo() { document.getElementById("bill-no").innerText = document.getElementById("input-bill-no").value || "--"; }
        function updateOrderNo() { document.getElementById("order-no").innerText = document.getElementById("input-order-no").value || "--"; }
        function updateTableNo() { document.getElementById("table-number").innerText = document.getElementById("input-table-no").value || "--"; }

        function checkEnter(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                addItem();
            }
        }

        // Add dynamic rows
        function addItem() {
            var name = document.getElementById("item-name").value;
            var qty = parseInt(document.getElementById("item-qty").value);
            var price = parseFloat(document.getElementById("item-price").value);

            if(name === "" || isNaN(qty) || isNaN(price) || qty <= 0 || price <= 0) {
                alert("Please enter valid Item details!");
                return;
            }

            var itemTotal = qty * price;
            totalAmount += itemTotal;

            var tbody = document.getElementById("bill-items");
            var row = document.createElement("tr");

            row.innerHTML = `
                <td>${name}</td>
                <td class="text-right">${qty}</td>
                <td class="text-right">₹${price.toFixed(2)}</td>
                <td class="text-right">₹${itemTotal.toFixed(2)}</td>
                <td class="delete-col text-right"><button class="btn-delete" onclick="deleteItem(this, ${itemTotal})">Delete</button></td>
            `;

            tbody.appendChild(row);
            document.getElementById("grand-total").innerText = totalAmount.toFixed(2);

            // Clear item input nodes
            document.getElementById("item-name").value = "";
            document.getElementById("item-qty").value = "1";
            document.getElementById("item-price").value = "";
            document.getElementById("item-name").focus();
        }

        // Delete explicit row
        function deleteItem(button, itemTotal) {
            var row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
            totalAmount -= itemTotal;
            document.getElementById("grand-total").innerText = totalAmount.toFixed(2);
        }

        // ================= METHOD 1: PLAIN TEXT ESC/POS =================
        function printViaText() {
            let tableRows = document.querySelectorAll("#bill-items tr");
            if(tableRows.length === 0) {
                alert("Please add items first!");
                return;
            }

            let text = "";
            text += "         MY RETAIL SHOP          \n";
            text += "   Bhiwandi, Maharashtra, India  \n";
            text += "        Mob: +91 9876543210      \n";
            text += "------------------------------------------------\n";
            text += "Bill No:  #" + document.getElementById("bill-no").innerText + "\n";
            text += "Order No: " + document.getElementById("order-no").innerText + "\n";
            text += "Table No: " + document.getElementById("table-number").innerText + "\n";
            text += "Date:     " + document.getElementById("bill-date").innerText + "\n";
            text += "------------------------------------------------\n";
            text += "Item Name          Qty    Rate          Total   \n";
            text += "------------------------------------------------\n";

            tableRows.forEach(row => {
                let cols = row.querySelectorAll("td");
                if(cols.length >= 4) {
                    let name = cols[0].innerText;
                    let qty = cols[1].innerText;
                    let rate = cols[2].innerText.replace('₹', '');
                    let total = cols[3].innerText.replace('₹', '');
                    
                    let itemLine = name.substring(0, 18).padEnd(19, ' ') + 
                                   qty.padStart(4, ' ') + 
                                   rate.padStart(11, ' ') + 
                                   total.padStart(14, ' ') + "\n";
                    text += itemLine;
                }
            });

            text += "------------------------------------------------\n";
            let totalVal = document.getElementById("grand-total").innerText;
            text += "Grand Total:".padEnd(30, ' ') + ("INR " + totalVal).padStart(18, ' ') + "\n";
            text += "------------------------------------------------\n\n";
            text += "          Thank You! Visit Again.       \n\n\n\n";

            let intentUrl = "intent:#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.text=" + encodeURIComponent(text) + ";end;";
            window.location.href = intentUrl;
        }

        // ================= METHOD 2: DIRECT 3-INCH PDF GENERATION =================
        function printViaPDF() {
            let tableRows = document.querySelectorAll("#bill-items tr");
            if(tableRows.length === 0) {
                alert("Please add items first!");
                return;
            }

            const { jsPDF } = window.jspdf;
            
            // 80mm width standard thermal footprint roll scaling metrics 
            // Calculate height dynamically based on items array length to avoid whitespace trail
            let dynamicHeight = 110 + (tableRows.length * 8); 

            const doc = new jsPDF({
                orientation: 'p',
                unit: 'mm',
                format: [80, dynamicHeight]
            });

            // Set monospace ticket font for perfect tracking alignment
            doc.setFont("courier", "normal");

            // Header Section
            doc.setFontSize(14);
            doc.setFont("courier", "bold");
            doc.text("MY RETAIL SHOP", 40, 10, { align: 'center' });
            
            doc.setFontSize(9);
            doc.setFont("courier", "normal");
            doc.text("Bhiwandi, Maharashtra, India", 40, 15, { align: 'center' });
            doc.text("Mob: +91 9876543210", 40, 19, { align: 'center' });
            
            doc.text("------------------------------------------", 4, 24);
            
            // Meta Info
            doc.text("Bill No:  #" + document.getElementById("bill-no").innerText, 5, 29);
            doc.text("Order No: " + document.getElementById("order-no").innerText, 5, 34);
            doc.text("Table No: " + document.getElementById("table-number").innerText, 5, 39);
            doc.text("Date:     " + document.getElementById("bill-date").innerText, 5, 44);
            
            doc.text("------------------------------------------", 4, 49);
            
            // Table Header 
            doc.setFont("courier", "bold");
            doc.text("Item Name        Qty   Rate       Total", 5, 54);
            doc.text("------------------------------------------", 4, 58);
            
            // Print Rows
            doc.setFont("courier", "normal");
            let currentY = 63;
            
            tableRows.forEach(row => {
                let cols = row.querySelectorAll("td");
                if(cols.length >= 4) {
                    let name = cols[0].innerText.substring(0, 15);
                    let qty = cols[1].innerText;
                    let rate = cols[2].innerText.replace('₹', '');
                    let total = cols[3].innerText.replace('₹', '');

                    // Alignment padding algorithm logic for 80mm PDF view
                    let lineStr = name.padEnd(16, ' ') + 
                                  qty.padStart(4, ' ') + 
                                  rate.padStart(9, ' ') + 
                                  total.padStart(12, ' ');
                                  
                    doc.text(lineStr, 5, currentY);
                    currentY += 6;
                }
            });

            // Total Block calculation
            doc.text("------------------------------------------", 4, currentY);
            currentY += 5;
            doc.setFont("courier", "bold");
            let totalVal = document.getElementById("grand-total").innerText;
            doc.text("Grand Total: " + "INR " + totalVal, 5, currentY);
            
            // Footer Section
            currentY += 6;
            doc.text("------------------------------------------", 4, currentY);
            currentY += 6;
            doc.setFont("courier", "italic");
            doc.text("Thank You! Visit Again.", 40, currentY, { align: 'center' });

            // Generate explicit raw Base64 data bundle array
            let rawPdfUri = doc.output('datauristring');
            let base64Data = rawPdfUri.split(',')[1];

            // Official RawBT Android PDF Payload Intent Engine trigger
            let intentUrl = "intent:#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.pdf=" + encodeURIComponent(base64Data) + ";end;";
            window.location.href = intentUrl;
        }
    </script>
</body>
</html>
